<<!DOCTYPE html>
<html>
<head>
    <title>Monitor de Alterações</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 15px;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        button:hover {
            background: #16a34a;
        }

        .log {
            background: #1e293b;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #38bdf8;
        }

        .hora {
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<h1>📡 Monitor de Alterações</h1>

<!-- 🔥 BOTÃO TESTE -->
<button onclick="testarNotificacao()">🔔 Testar Notificação Windows</button>

<div id="logs">
    {% for r in registros %}
        <div class="log">
            {{ r.texto }} <br>
            <span class="hora">{{ r.hora }}</span>
        </div>
    {% endfor %}
</div>

<script>
const socket = io();

// evento em tempo real
socket.on("nova_notificacao", function(data) {
    const div = document.createElement("div");
    div.className = "log";
    div.innerHTML = `
        ${data.texto} <br>
        <span class="hora">${data.hora}</span>
    `;

    document.getElementById("logs").prepend(div);

    // alerta no navegador
    alert("🔔 Nova notificação recebida!");
});

// botão chama backend
function testarNotificacao() {
    fetch("/teste-notificacao")
        .then(res => res.text())
        .then(data => {
            console.log("Teste enviado:", data);
        });
}
</script>

</body>
</html>
