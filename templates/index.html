<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Industrial</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .log {
            background: #1e293b;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #38bdf8;
        }

        .hora {
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<h1>📡 Sistema Industrial de Monitoramento</h1>

<button onclick="teste()">🔔 Teste de Notificação</button>

<div id="logs">
    {% for r in registros %}
    <div class="log">
        {{ r.texto }} <br>
        <span class="hora">{{ r.hora }}</span>
    </div>
    {% endfor %}
</div>

<script>
function teste() {
    fetch("/teste")
    .then(res => res.json())
    .then(data => {
        alert("✔ Teste executado com sucesso");
        location.reload();
    });
}
</script>

</body>
</html>
